<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Calculator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <div class="textDisplay">
                <p class="history"></p>
                <p class="result"></p>
            </div>
            <div id="buttonContainer">
                <button class="buttons special ">&lt</button>
                <button class="buttons special">+/-</button>
                <button class="buttons special operators">%</button>
                <button class="buttons side operators">/</button>
                <button class="buttons">7</button>
                <button class="buttons">8</button>
                <button class="buttons">9</button>
                <button class="buttons side operators">*</button>
                <button class="buttons">4</button>
                <button class="buttons">5</button>
                <button class="buttons">6</button>
                <button class="buttons side operators">-</button>
                <button class="buttons">1</button>
                <button class="buttons">2</button>
                <button class="buttons">3</button>
                <button class="buttons side operators">+</button>
                <button class="buttons">C</button>
                <button class="buttons">0</button>
                <button class="buttons dot">.</button>
                <button class="buttons equals side">=</button>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
